name: BasselefantiOS
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  BasselefantiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: ../Sources/BasselefantApp/Audio/AudioFeature.swift
      - path: ../Sources/BasselefantApp/Audio/AudioAnalyzer.swift
      - path: ../Sources/BasselefantApp/Visuals/VisualStyle.swift
      - path: ../Sources/BasselefantApp/Visuals/BasselefantVisualizer.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blackmaddin.basselefant.ios
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_ASSET_PATHS: ""
